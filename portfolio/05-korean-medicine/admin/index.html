<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>관리자 로그인 | 쿠마한의원</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <h1>상담 회원 / 관리자 로그인</h1>
    <p class="login-sub">전후 사진 열람은 의료법에 따라 로그인 후에만 제공됩니다.</p>
    <form action="dashboard.html" class="login-form">
      <div class="form-row">
        <label for="email">이메일</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-row">
        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="btn-primary">로그인</button>
    </form>
    <p class="login-footnote"><a href="#">회원가입</a> · <a href="#">비밀번호 찾기</a></p>
    <div class="login-note">
      포트폴리오 데모 화면입니다. 실제 인증은 동작하지 않으며, "로그인" 클릭 시 대시보드 목업으로 이동합니다.
    </div>
  </div>
</div>

</body>
</html>
