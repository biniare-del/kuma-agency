<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상담 문의 | 꿈을담은에이전시</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="../images/logo-icon.png">
<link rel="stylesheet" href="contact.css">
</head>
<body>

<header class="tool-header">
  <div class="wrap">
    <a href="../index.html" class="logo"><img src="../images/logo-icon.png" alt="" width="24" height="25">꿈을담은<span>에이전시</span></a>
    <p>상담 문의</p>
  </div>
</header>

<main class="wrap">

  <section class="intro">
    <h1>병원 정보를 남겨주시면 확인 후 연락드립니다</h1>
    <p>아래 항목을 입력하고 보내기를 누르면, 입력하신 메일 앱이 열리며 내용이 채워집니다. 메일을 그대로 전송해주시면 됩니다.</p>
  </section>

  <form class="contact-form" action="mailto:biniare@gmail.com" method="GET" enctype="text/plain">
    <div class="form-row">
      <label for="f-name">이름 *</label>
      <input type="text" id="f-name" name="이름" required>
    </div>
    <div class="form-row">
      <label for="f-phone">연락처 *</label>
      <input type="tel" id="f-phone" name="연락처" placeholder="010-0000-0000" required>
    </div>
    <div class="form-row">
      <label for="f-hospital">병원명</label>
      <input type="text" id="f-hospital" name="병원명">
    </div>
    <div class="form-row">
      <label for="f-dept">진료과목</label>
      <input type="text" id="f-dept" name="진료과목" placeholder="예: 성형외과, 치과, 한의원">
    </div>
    <div class="form-row">
      <label for="f-url">홈페이지 주소</label>
      <input type="text" id="f-url" name="홈페이지주소" placeholder="www.우리병원홈페이지.com">
    </div>
    <div class="form-row">
      <label for="f-msg">문의 내용 *</label>
      <textarea id="f-msg" name="문의내용" rows="6" required placeholder="궁금하신 점이나 현재 상황을 자유롭게 남겨주세요."></textarea>
    </div>
    <button type="submit" class="btn-cta">메일로 보내기</button>
    <p class="hint">버튼을 누르면 기본 메일 앱이 열립니다. 메일 앱이 바로 열리지 않는다면 <a href="mailto:biniare@gmail.com">biniare@gmail.com</a>으로 직접 보내주세요.</p>
  </form>

</main>

<footer class="tool-footer">
  <p>꿈을담은에이전시 | 사업자등록번호 117-14-33223 | biniare@gmail.com</p>
</footer>

</body>
</html>
