<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상담 문의 | 꿈을담은에이전시</title>
<meta name="robots" content="noindex">
<link rel="icon" href="../images/logo-kit/favicon.ico">
<link rel="stylesheet" href="contact.css">
</head>
<body>

<header class="tool-header">
  <div class="wrap tool-header-inner">
    <a href="../index.html" class="logo"><img src="../images/logo-kit/png/logo-header-white.png" alt="꿈을담은에이전시" height="32" style="vertical-align:middle;margin-right:6px;"></a>
    <nav class="desk-nav" aria-label="주요 메뉴">
      <ul>
        <li><a href="../index.html#portfolio">포트폴리오</a></li>
        <li><a href="../index.html#why">왜 필요한가</a></li>
        <li><a href="../check/index.html">무료 진단</a></li>
        <li><a href="../contact/index.html">상담 문의</a></li>
        <li><a href="../quote/index.html">견적서</a></li>
      </ul>
    </nav>
    <button type="button" class="nav-toggle" id="navToggle" aria-expanded="false" aria-controls="mobileNav" aria-label="메뉴 열기">
      <span></span><span></span><span></span>
    </button>
  </div>
  <nav class="mobile-nav" id="mobileNav" aria-label="모바일 메뉴">
    <ul>
      <li><a href="../index.html#portfolio">포트폴리오</a></li>
      <li><a href="../index.html#why">왜 필요한가</a></li>
      <li><a href="../check/index.html">무료 진단</a></li>
      <li><a href="../contact/index.html">상담 문의</a></li>
      <li><a href="../quote/index.html">견적서</a></li>
    </ul>
  </nav>
</header>

<main class="wrap">

  <section class="intro">
    <h1>상담 문의</h1>
    <p>병원명과 연락처를 남겨주시면 확인 후 직접 연락드립니다.</p>
  </section>

  <form class="contact-form" action="https://formspree.io/f/xkodndpg" method="POST">
    <div class="form-field">
      <label for="hospital">병원/업체명 <span class="req">*</span></label>
      <input type="text" id="hospital" name="hospital" placeholder="예: 쿠마성형외과" required>
    </div>
    <div class="form-field">
      <label for="name">담당자 이름 <span class="req">*</span></label>
      <input type="text" id="name" name="name" placeholder="예: 김원장" required>
    </div>
    <div class="form-field">
      <label for="phone">연락처 <span class="req">*</span></label>
      <input type="tel" id="phone" name="phone" placeholder="010-0000-0000" required>
    </div>
    <div class="form-field">
      <label for="email">이메일</label>
      <input type="email" id="email" name="email" placeholder="example@hospital.com">
    </div>
    <div class="form-field">
      <label for="message">문의 내용</label>
      <textarea id="message" name="message" rows="4" placeholder="궁금하신 점이나 현재 상황을 간단히 적어주세요."></textarea>
    </div>
    <div class="form-agree">
      <input type="checkbox" id="agree" required>
      <label for="agree">개인정보 수집·이용에 동의합니다 (수집항목: 이름·연락처·이메일, 목적: 상담 회신)</label>
    </div>
    <button type="submit" class="btn-submit">문의 보내기</button>
    <p class="hint">영업일 기준 1일 이내 회신드립니다.</p>
  </form>

  <div class="divider"></div>

  <div class="cta-row">
    <a href="../quote/" class="cta-card">
      <span class="cta-icon">📋</span>
      <strong>견적서 바로 확인</strong>
      <span>옵션 선택 → 자동 계산</span>
    </a>
    <a href="../check/" class="cta-card">
      <span class="cta-icon">🔍</span>
      <strong>무료 홈페이지 진단</strong>
      <span>현재 점수 바로 확인</span>
    </a>
  </div>

</main>

<footer class="tool-footer">
  <p>꿈을담은에이전시 | 사업자등록번호 117-14-33223 | dreamagency.choi@gmail.com</p>
  <p><a href="../privacy/index.html">개인정보처리방침</a></p>
</footer>

<script>
const t = document.getElementById('navToggle');
const m = document.getElementById('mobileNav');
if (t && m) {
  t.addEventListener('click', () => {
    const open = m.classList.toggle('is-open');
    t.classList.toggle('is-open', open);
    t.setAttribute('aria-expanded', open);
  });
}
const form = document.querySelector('.contact-form');
form.addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = form.querySelector('.btn-submit');
  btn.textContent = '전송 중...';
  btn.disabled = true;
  try {
    const res = await fetch(form.action, {
      method: 'POST',
      body: new FormData(form),
      headers: { 'Accept': 'application/json' }
    });
    if (res.ok) {
      form.innerHTML = '<div class="success-msg"><p>✅ 문의가 접수되었습니다.</p><p>영업일 기준 1일 이내 연락드리겠습니다.</p></div>';
    } else {
      btn.textContent = '문의 보내기';
      btn.disabled = false;
      alert('전송 중 오류가 발생했습니다. 다시 시도해 주세요.');
    }
  } catch {
    btn.textContent = '문의 보내기';
    btn.disabled = false;
    alert('네트워크 오류입니다. 다시 시도해 주세요.');
  }
});
</script>
</body>
</html>
